name: Generate PlantUML Diagrams
on: [push, pull_request]

jobs:
  plantuml:
    runs-on: ubuntu-latest
    permissions:                # Job-level permissions configuration starts here
      contents: write           # 'write' access to repository contents
      pull-requests: write      # 'write' access to pull requests
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed UML files
        id: changed-uml-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          # Avoid using single or double quotes for multiline patterns
          files: |
            docs/*.puml

      - name: Generate PNG Diagrams
        if: steps.changed-uml-files.outputs.any_changed == 'true'
        uses: holowinski/plantuml-github-action@1.2025.4
        with:
          args: -v -tpng ${{ steps.changed-uml-files.outputs.all_changed_files }}

      - name: Push Local Changes
        if: steps.changed-uml-files.outputs.any_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate PNGs for PlantUML diagrams"
          branch: ${{ github.head_ref }}