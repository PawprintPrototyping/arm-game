; https://docs.platformio.org/page/projectconf.html

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps = 
	rlogiacco/CircularBuffer@^1.4.0
	paulstoffregen/TimerOne@^1.2
	arduinogetstarted/ezButton@^1.0.6
	waspinator/AccelStepper@^1.64
	laurb9/StepperDriver@^1.4.1
monitor_speed = 14400