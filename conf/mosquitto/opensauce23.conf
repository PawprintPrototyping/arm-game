# mosquitto config for the arm-game.
#
# Runs on the `arm-display` host. Drop into /etc/mosquitto/conf.d/ or point
# mosquitto directly at it: `mosquitto -c opensauce23.conf`.
#
# We expose two listeners:
#
#   * 1883 - the classic MQTT TCP listener that every game service already
#            uses (see conf/systemd-units/**/*.service).
#   * 9001 - a WebSockets listener so the ops dashboard's browser client can
#            connect directly to the broker (as opposed to going through the
#            FastAPI relay).

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true

persistence false
log_dest stderr
log_type warning
log_type error
log_type notice
